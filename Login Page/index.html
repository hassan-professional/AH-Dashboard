<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page || AH Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="../assets/AH_logo.png" width="100px" alt="">
        </div>
    </header>
    <main>
        <div class="login_container">
            <h1>Login</h1>
            <form id="form" action="">
                <label for="name">Name</label>
                <input id="username" type="text" placeholder="Username">
                <p class="UsernameResult"></p>
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="Password">
                <p class="PasswordResult"></p>
                <button type="submit">Login</button>
                <p class="buttonResult"></p>
            </form>
        </div>
        <div class="createnewAcc">
            <p>Don't have an account? <a href="../New Account/index.html">Create one</a></p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
